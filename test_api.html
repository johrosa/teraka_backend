<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Sécurité Carbone</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table-container { max-height: 500px; overflow-y: auto; }
        #data-output { font-size: 0.85rem; }
        .loader { display: none; }
    </style>
</head>
<body>
    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold">🧪 Test Système de Sécurité Carbone</h1>
            <p class="lead text-muted">Interface de test pour l'API Django</p>
        </header>

        <div class="row g-4">
            <!-- 1. Connexion -->
            <div class="col-md-4">
                <div class="card h-100 h-100 border-0 p-3">
                    <div class="card-body">
                        <h4 class="card-title mb-4">🔑 Connexion</h4>
                        <div class="mb-3">
                            <label for="user" class="form-label">Utilisateur</label>
                            <input type="text" id="user" class="form-control" placeholder="Nom d'utilisateur">
                        </div>
                        <div class="mb-3">
                            <label for="pass" class="form-label">Mot de passe</label>
                            <input type="password" id="pass" class="form-control" placeholder="Mot de passe">
                        </div>
                        <button onclick="login()" class="btn btn-primary w-100 mb-3" id="login-btn">
                            <span id="login-spinner" class="spinner-border spinner-border-sm loader" role="status"></span>
                            Se Connecter
                        </button>
                        <div id="auth-status"></div>
                    </div>
                </div>
            </div>

            <!-- 2. Accès aux tables -->
            <div class="col-md-8">
                <div class="card border-0 p-3">
                    <div class="card-body">
                        <h4 class="card-title mb-4">📊 Accès aux tables</h4>
                        <div class="d-flex gap-2 mb-4">
                            <button onclick="fetchData('communes')" class="btn btn-outline-success">
                                <i class="bi bi-tree"></i> Charger "Communes"
                            </button>
                            <button onclick="fetchData('pg_infos')" class="btn btn-outline-info">
                                <i class="bi bi-info-circle"></i> Charger "PG Infos"
                            </button>
                        </div>

                        <!-- 3. Optimisation -->
                        <div class="card bg-light border-0 mb-4">
                            <div class="card-body py-2">
                                <h6 class="card-title mb-2">🚀 Optimisation PostgREST</h6>
                                <div class="row g-2">
                                    <div class="col-md-6">
                                        <div class="input-group input-group-sm">
                                            <span class="input-group-text">Colonnes</span>
                                            <input type="text" id="opt-select" class="form-control" placeholder="ex: id,nom">
                                        </div>
                                    </div>
                                    <div class="col-md-3">
                                        <div class="input-group input-group-sm">
                                            <span class="input-group-text">Limite</span>
                                            <input type="number" id="opt-limit" class="form-control" placeholder="10">
                                        </div>
                                    </div>
                                    <div class="col-md-3">
                                        <div class="input-group input-group-sm">
                                            <span class="input-group-text">Offset</span>
                                            <input type="number" id="opt-offset" class="form-control" placeholder="0">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div id="loading" class="text-center my-4 loader">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2 text-muted">Chargement des données...</p>
                        </div>

                        <div id="table-container" class="table-container bg-white rounded border d-none">
                            <table class="table table-hover mb-0" id="data-table">
                                <thead class="table-light sticky-top">
                                    <tr id="table-header"></tr>
                                </thead>
                                <tbody id="table-body"></tbody>
                            </table>
                        </div>

                        <div id="raw-data-container" class="mt-4">
                            <h5>JSON Brut</h5>
                            <pre id="data-output" class="bg-light p-3 rounded border">Les données s'afficheront ici...</pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let accessToken = "";

        async function login() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('login-btn');
            const spinner = document.getElementById('login-spinner');
            const status = document.getElementById('auth-status');

            if (!user || !pass) {
                status.innerHTML = `<div class="alert alert-warning py-2 small">Veuillez remplir les champs.</div>`;
                return;
            }

            // UI state
            btn.disabled = true;
            spinner.style.display = "inline-block";
            status.innerHTML = "";

            try {
                const response = await fetch('http://localhost:8000/api/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({username: user, password: pass})
                });

                if (response.ok) {
                    const data = await response.json();
                    accessToken = data.access;
                    status.innerHTML = `<div class="alert alert-success py-2 small">✅ Connecté ! Token reçu.</div>`;
                } else {
                    status.innerHTML = `<div class="alert alert-danger py-2 small">❌ Échec d'authentification.</div>`;
                }
            } catch (err) {
                status.innerHTML = `<div class="alert alert-danger py-2 small">❌ Erreur de connexion au serveur.</div>`;
            } finally {
                btn.disabled = false;
                spinner.style.display = "none";
            }
        }

        async function fetchData(tableName) {
            if (!accessToken) { 
                alert("Connectez-vous d'abord !"); 
                return; 
            }

            const loader = document.getElementById('loading');
            const tableContainer = document.getElementById('table-container');
            const dataOutput = document.getElementById('data-output');

            // Optimisation parameters
            const select = document.getElementById('opt-select').value;
            const limit = document.getElementById('opt-limit').value;
            const offset = document.getElementById('opt-offset').value;

            // Construit l'URL avec les paramètres d'optimisation
            let url = `http://localhost:8000/api/data/${tableName}?`;
            if (select) url += `select=${select}&`;
            if (limit) url += `limit=${limit}&`;
            if (offset) url += `offset=${offset}&`;

            // UI State
            loader.style.display = "block";
            tableContainer.classList.add('d-none');
            dataOutput.innerText = "Chargement...";

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Accept': 'application/json'
                    }
                });

                const result = await response.json();
                
                // Update RAW view
                dataOutput.innerText = JSON.stringify(result, null, 2);

                // Build Table
                if (Array.isArray(result) && result.length > 0) {
                    buildTable(result);
                    tableContainer.classList.remove('d-none');
                } else if (typeof result === 'object' && !Array.isArray(result)) {
                    // Si c'est un seul objet
                    buildTable([result]);
                    tableContainer.classList.remove('d-none');
                }
            } catch (err) {
                dataOutput.innerText = "Erreur: " + err.message;
            } finally {
                loader.style.display = "none";
            }
        }

        function buildTable(data) {
            const header = document.getElementById('table-header');
            const body = document.getElementById('table-body');
            
            // Clear existing
            header.innerHTML = "";
            body.innerHTML = "";

            if (data.length === 0) return;

            // Header
            const keys = Object.keys(data[0]);
            keys.forEach(key => {
                const th = document.createElement('th');
                th.innerText = key;
                header.appendChild(th);
            });

            // Rows
            data.forEach(row => {
                const tr = document.createElement('tr');
                keys.forEach(key => {
                    const td = document.createElement('td');
                    let val = row[key];
                    if (typeof val === 'object' && val !== null) {
                        val = JSON.stringify(val);
                    }
                    td.innerText = val !== null ? val : "-";
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }
    </script>
</body>
</html>
