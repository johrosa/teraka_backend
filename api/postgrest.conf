# --- Connexion à la base de données ---
# Format : postgres://utilisateur:mot_de_passe@hote:port/nom_db
db-uri = "postgres://postgres:ad,in@localhost:5432/teraka"

# --- Schéma à exposer ---
# Généralement 'public', mais mettez le nom du schéma où sont vos 70 tables
db-schema = "public"

# --- Rôles et Sécurité ---
# Le rôle utilisé pour les requêtes sans authentification (lecture seule publique par ex.)
db-anon-role = "web_anon"

# La clé secrète pour décoder les JWT envoyés par Django
# ATTENTION : Doit être IDENTIQUE à la SIGNING_KEY de Django (min. 32 caractères)
jwt-secret = "django-insecure-3=#-gb(y!sq*&=2chy@7k#+0&-uv2#w%+v4!anm#u(=&g@797^"

# --- Configuration Serveur ---
server-host = "0.0.0.0"
# server-port can be overridden by the run_servers.py script which generates a temporary
# config with server-port set to the environment variable POSTGREST_PORT or the value
# from Django settings.POSTGREST_PORT. Default kept here for direct use.
server-port = 3000

# --- Optimisation pour les grosses bases (70 tables) ---
# Nombre max de lignes retournées par requête (évite de saturer le plugin QGIS)
max-rows = 1000
